<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>DMA · Lojas</title>
<style>
  :root{
    --red:#C0150E; --red-deep:#8E0D08; --red-bright:#E2231A;
    --ink:#1A1614; --muted:#736B66; --faint:#A39C97;
    --bg:#F4F1EE; --card:#FFFFFF; --line:#E8E2DD; --line-soft:#F0EBE6;
    --epa:#C0150E; --premium:#8E0D08; --mineirao:#15508E;
    --atacarejo:#0F7A5A; --neutral:#6B6460;
    --shadow:0 1px 2px rgba(26,22,20,.06), 0 6px 18px rgba(26,22,20,.05);
    --safe-top:env(safe-area-inset-top,0px);
    --safe-bottom:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    background:var(--bg); color:var(--ink);
    font-variant-numeric:tabular-nums;
    -webkit-font-smoothing:antialiased;
    overscroll-behavior-y:none;
  }
  .app{max-width:520px;margin:0 auto;min-height:100%;background:var(--bg);position:relative;}

  /* ---------- Header ---------- */
  header.top{
    position:sticky;top:0;z-index:30;
    background:linear-gradient(180deg,var(--red) 0%, var(--red-deep) 140%);
    color:#fff;
    padding:calc(var(--safe-top) + 14px) 16px 12px;
    box-shadow:0 4px 16px rgba(142,13,8,.28);
  }
  .brand{display:flex;align-items:center;gap:11px;margin-bottom:13px;}
  .logo{
    width:38px;height:38px;border-radius:10px;flex:none;
    background:#fff;color:var(--red);
    display:grid;place-items:center;
    font-weight:800;font-size:15px;letter-spacing:-.5px;
    box-shadow:inset 0 0 0 2px rgba(192,21,14,.12);
  }
  .brand .t{line-height:1;}
  .brand .t b{font-size:17px;font-weight:700;letter-spacing:.2px;display:block;}
  .brand .t span{font-size:11.5px;opacity:.82;letter-spacing:.6px;text-transform:uppercase;font-weight:600;}
  .brand .count{margin-left:auto;text-align:right;line-height:1;}
  .brand .count b{font-size:19px;font-weight:800;display:block;}
  .brand .count span{font-size:10px;opacity:.8;letter-spacing:.6px;text-transform:uppercase;}

  .searchwrap{position:relative;}
  .searchwrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.55;}
  #q{
    width:100%;border:0;border-radius:12px;
    padding:12px 38px 12px 38px;font-size:16px;
    background:rgba(255,255,255,.96);color:var(--ink);
    font-family:inherit;outline:none;
  }
  #q::placeholder{color:var(--faint);}
  .clearbtn{
    position:absolute;right:6px;top:50%;transform:translateY(-50%);
    border:0;background:transparent;width:32px;height:32px;border-radius:8px;
    color:var(--muted);font-size:18px;display:none;place-items:center;cursor:pointer;
  }
  .clearbtn.show{display:grid;}

  /* ---------- Filters ---------- */
  .filters{
    position:sticky;top:0;z-index:20;
    background:var(--bg);
    padding:10px 0 8px;border-bottom:1px solid var(--line);
  }
  .chips{display:flex;gap:8px;overflow-x:auto;padding:2px 16px 4px;scrollbar-width:none;}
  .chips::-webkit-scrollbar{display:none;}
  .chip{
    flex:none;border:1px solid var(--line);background:var(--card);
    color:var(--muted);font-size:13px;font-weight:600;
    padding:7px 13px;border-radius:999px;cursor:pointer;white-space:nowrap;
    transition:background .15s,color .15s,border-color .15s;
  }
  .chip[aria-pressed="true"]{background:var(--ink);color:#fff;border-color:var(--ink);}
  .chip[aria-pressed="true"][data-key="EPA"]{background:var(--epa);border-color:var(--epa);}
  .regionrow{padding:8px 16px 2px;}
  .regionrow select{
    width:100%;font-family:inherit;font-size:14px;font-weight:600;color:var(--ink);
    border:1px solid var(--line);background:var(--card);border-radius:11px;
    padding:11px 12px;outline:none;appearance:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%23736B66' stroke-width='2.5' stroke-linecap='round'><path d='M6 9l6 6 6-6'/></svg>");
    background-repeat:no-repeat;background-position:right 12px center;
  }

  /* ---------- List ---------- */
  .meta{padding:12px 16px 4px;font-size:12px;color:var(--muted);font-weight:600;letter-spacing:.3px;}
  .list{padding:4px 12px calc(28px + var(--safe-bottom));}
  .row{
    background:var(--card);border:1px solid var(--line);
    border-radius:14px;padding:13px 14px;margin-bottom:9px;
    box-shadow:var(--shadow);cursor:pointer;
    transition:transform .08s ease, box-shadow .12s;
    display:block;width:100%;text-align:left;font-family:inherit;
  }
  .row:active{transform:scale(.985);}
  .row .head{display:flex;align-items:baseline;gap:9px;}
  .row .code{font-size:13px;font-weight:800;color:var(--red);letter-spacing:.3px;flex:none;}
  .row .name{font-size:16px;font-weight:700;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .row .pill{margin-left:auto;flex:none;}
  .pill{
    font-size:10px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;
    color:#fff;padding:3px 8px;border-radius:6px;white-space:nowrap;
  }
  .row .loc{font-size:13px;color:var(--muted);margin:5px 0 9px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .row .elec{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--ink);font-weight:600;flex-wrap:wrap;}
  .row .elec .b{display:inline-flex;align-items:center;gap:4px;background:var(--line-soft);padding:4px 8px;border-radius:7px;}
  .row .elec .b.dim{color:var(--faint);font-weight:600;}
  .bolt{color:var(--red);flex:none;}

  .empty{text-align:center;padding:54px 30px;color:var(--muted);}
  .empty b{display:block;font-size:16px;color:var(--ink);margin-bottom:6px;}
  .empty span{font-size:14px;}

  /* ---------- Detail ---------- */
  .detail{
    position:fixed;inset:0;z-index:50;background:var(--bg);
    transform:translateX(100%);transition:transform .26s cubic-bezier(.3,.7,.3,1);
    overflow-y:auto;max-width:520px;margin:0 auto;
  }
  .detail.open{transform:translateX(0);}
  .dhead{
    position:sticky;top:0;z-index:2;
    background:linear-gradient(180deg,var(--red) 0%, var(--red-deep) 160%);
    color:#fff;padding:calc(var(--safe-top) + 10px) 16px 18px;
    box-shadow:0 4px 16px rgba(142,13,8,.25);
  }
  .backbtn{
    border:0;background:rgba(255,255,255,.16);color:#fff;
    width:38px;height:38px;border-radius:10px;display:grid;place-items:center;cursor:pointer;
    margin-bottom:12px;
  }
  .dhead .dcode{font-size:13px;font-weight:800;letter-spacing:1px;opacity:.9;}
  .dhead .dname{font-size:25px;font-weight:800;letter-spacing:-.3px;margin:3px 0 10px;line-height:1.1;}
  .dhead .dtags{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .dhead .status{
    font-size:11px;font-weight:700;letter-spacing:.4px;
    background:rgba(255,255,255,.18);padding:4px 9px;border-radius:6px;text-transform:uppercase;
  }
  .dhead .status.open::before{content:"";display:inline-block;width:7px;height:7px;border-radius:50%;background:#5BE08A;margin-right:6px;vertical-align:middle;}

  .section{padding:18px 16px 4px;}
  .section .lbl{font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--faint);margin-bottom:9px;}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden;}

  .maplink{display:flex;align-items:center;gap:13px;padding:15px 15px;text-decoration:none;color:inherit;}
  .maplink:active{background:var(--line-soft);}
  .mapicon{width:42px;height:42px;border-radius:11px;flex:none;display:grid;place-items:center;background:var(--epa);color:#fff;}
  .maplink .addr{flex:1;min-width:0;}
  .maplink .addr .street{font-size:15px;font-weight:700;line-height:1.3;}
  .maplink .addr .city{font-size:13px;color:var(--muted);margin-top:2px;}
  .maplink .go{font-size:12px;font-weight:800;color:var(--red);letter-spacing:.3px;flex:none;display:flex;align-items:center;gap:3px;}

  .kv{display:flex;justify-content:space-between;align-items:center;gap:14px;padding:13px 15px;border-top:1px solid var(--line-soft);}
  .kv:first-child{border-top:0;}
  .kv .k{font-size:13.5px;color:var(--muted);font-weight:600;flex:none;}
  .kv .v{font-size:15px;font-weight:700;text-align:right;color:var(--ink);overflow-wrap:anywhere;}
  .kv .v.mono{font-variant-numeric:tabular-nums;letter-spacing:.2px;}
  .kv .v.dash{color:var(--faint);font-weight:600;}
  .tag-tot{color:var(--atacarejo);} .tag-parc{color:var(--mineirao);}

  .footnote{padding:18px 16px calc(30px + var(--safe-bottom));text-align:center;color:var(--faint);font-size:11px;line-height:1.5;}
  @media (prefers-reduced-motion: reduce){
    .detail,.row,.chip{transition:none !important;}
  }
</style>
</head>

/* ---------- helpers ---------- */
const NULLISH = new Set(['','NA','N/A','0','0V','-','—','NÃO INFORMADO']);
const isNull = v => !v || NULLISH.has(String(v).trim().toUpperCase());
const show = v => isNull(v) ? '—' : String(v).trim();
const titl = s => s; // keep source casing
function bandeiraClass(b){
  b=(b||'').toUpperCase();
  if(b==='EPA') return 'epa';
  if(b==='EPA PREMIUM') return 'premium';
  if(b==='MINEIRÃO') return 'mineirao';
  if(b==='BRASIL ATACAREJO') return 'atacarejo';
  return 'neutral';
}
const BANDCOLOR={epa:'var(--epa)',premium:'var(--premium)',mineirao:'var(--mineirao)',atacarejo:'var(--atacarejo)',neutral:'var(--neutral)'};
function bandeiraShort(b){
  const m={'EPA PREMIUM':'PREMIUM','CEN. DISTRIBUIÇÃO':'CD','BRASIL ATACAREJO':'ATACAREJO','REDE MAIS BRASIL':'+BRASIL','INDUSTRIA PANIF BH':'PANIF BH','INDUSTRIA PANIF TO':'PANIF TO','ADMINISTRATIVO':'ADMIN'};
  return m[(b||'').toUpperCase()] || b;
}
function mapsUrl(d){
  const parts=[d.rua,d.bairro,d.cidade].filter(p=>!isNull(p));
  if(!parts.length) return null;
  return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(parts.join(', '));
}
function kva(v){ if(isNull(v)) return '—'; v=String(v).trim(); return /kva/i.test(v)?v:v+' kVA'; }
function tensao(v){ if(isNull(v)) return '—'; v=String(v).trim(); return /v$/i.test(v)?v:v+' V'; }

/* ---------- state ---------- */
let fQuery='';

/* ---------- search ---------- */
const norm=s=>(s||'').toString().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
const qEl=document.getElementById('q'), clearEl=document.getElementById('clear');
qEl.oninput=()=>{ fQuery=qEl.value; clearEl.classList.toggle('show',!!fQuery); render(); };
clearEl.onclick=()=>{ qEl.value='';fQuery='';clearEl.classList.remove('show');qEl.focus();render(); };

/* ---------- render list ---------- */
const listEl=document.getElementById('list'), metaEl=document.getElementById('meta');
document.getElementById('total').textContent=DATA.length;

function match(d){
  if(fQuery){
    const q=norm(fQuery);
    const hay=norm([d.centro,d.nome,d.cidade,d.bairro,d.rua,d.uc,d.uc_orig,d.motor,d.regiao].join(' '));
    if(!hay.includes(q)) return false;
  }
  return true;
}

function render(){
  const res=DATA.filter(match);
  metaEl.textContent = res.length===DATA.length
    ? `${res.length} lojas`
    : `${res.length} de ${DATA.length} lojas`;
  if(!res.length){
    listEl.innerHTML='<div class="empty"><b>Nada encontrado</b><span>Ajuste a busca ou os filtros acima.</span></div>';
    return;
  }
  const frag=document.createDocumentFragment();
  res.forEach((d,i)=>{
    const idx=DATA.indexOf(d);
    const bc=bandeiraClass(d.bandeira);
    const card=document.createElement('button');
    card.className='row';
    const loc=[d.bairro,d.cidade].filter(x=>!isNull(x)).join(' · ');
    const elec = isNull(d.motor)&&isNull(d.kva)
      ? `<span class="b dim">Sem gerador cadastrado</span>`
      : `<span class="b"><svg class="bolt" width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M13 2L3 14h7l-1 8 10-12h-7z"/></svg>${show(d.motor)}</span>`+
        (isNull(d.kva)?'':`<span class="b">${kva(d.kva)}</span>`)+
        (isNull(d.tensao)?'':`<span class="b">${tensao(d.tensao)}</span>`)+
        (isNull(d.tipo)?'':`<span class="b">${show(d.tipo).toUpperCase()}</span>`);
    card.innerHTML=
      `<div class="head">
         <span class="code">${show(d.centro)}</span>
         <span class="name">${show(d.nome)}</span>
         <span class="pill" style="background:${BANDCOLOR[bc]}">${bandeiraShort(d.bandeira)||'—'}</span>
       </div>
       <div class="loc">${loc||'—'}</div>
       <div class="elec">${elec}</div>`;
    card.onclick=()=>openDetail(idx);
    frag.appendChild(card);
  });
  listEl.innerHTML='';listEl.appendChild(frag);
  listEl.scrollIntoView?null:null;
}

/* ---------- detail ---------- */
const detailEl=document.getElementById('detail');
function kvRow(k,v,cls){ return `<div class="kv"><span class="k">${k}</span><span class="v ${cls||''} ${v==='—'?'dash':''}">${v}</span></div>`; }

function openDetail(idx){
  const d=DATA[idx];
  const bc=bandeiraClass(d.bandeira);
  const url=mapsUrl(d);
  const street=show(d.rua);
  const city=[d.bairro,d.cidade].filter(x=>!isNull(x)).join(' · ')||'—';
  const tipoCls = (d.tipo||'').toUpperCase().startsWith('TOTAL')?'tag-tot':((d.tipo||'').toUpperCase().startsWith('PARC')?'tag-parc':'');
  const addrInner=
    `<div class="mapicon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg></div>
     <div class="addr"><div class="street">${street}</div><div class="city">${city}</div></div>
     ${url?'<div class="go">MAPS <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M7 17L17 7M9 7h8v8"/></svg></div>':''}`;
  const addrBlock = url
    ? `<a class="maplink" href="${url}" target="_blank" rel="noopener">${addrInner}</a>`
    : `<div class="maplink" style="cursor:default">${addrInner}</div>`;

  detailEl.innerHTML=
    `<div class="dhead">
       <button class="backbtn" id="back" aria-label="Voltar"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
       <div class="dcode">${show(d.centro)}</div>
       <div class="dname">${show(d.nome)}</div>
       <div class="dtags">
         <span class="pill" style="background:rgba(255,255,255,.92);color:${BANDCOLOR[bc]}">${show(d.bandeira)}</span>
         ${isNull(d.status)?'':`<span class="status ${/abert/i.test(d.status)?'open':''}">${show(d.status)}</span>`}
       </div>
     </div>

     <div class="section">
       <div class="lbl">Endereço</div>
       <div class="panel">${addrBlock}</div>
     </div>

     <div class="section">
       <div class="lbl">Energia / Gerador</div>
       <div class="panel">
         ${kvRow('Motor', show(d.motor))}
         ${kvRow('Potência', kva(d.kva),'mono')}
         ${kvRow('Tensão', tensao(d.tensao),'mono')}
         ${kvRow('Cobertura', show(d.tipo).toUpperCase()==='—'?'—':show(d.tipo).toUpperCase(), tipoCls)}
       </div>
     </div>

     <div class="section">
       <div class="lbl">Fornecimento</div>
       <div class="panel">
         ${kvRow('Unidade Consumidora', show(d.uc),'mono')}
         ${kvRow('UC (original)', show(d.uc_orig),'mono')}
         ${kvRow('Bandeira', show(d.bandeira))}
         ${kvRow('Região', show(d.regiao))}
       </div>
     </div>

     <div class="footnote">DMA · Lojas — ficha cadastral interna</div>`;

  detailEl.classList.add('open');
  detailEl.setAttribute('aria-hidden','false');
  detailEl.scrollTop=0;
  document.body.style.overflow='hidden';
  document.getElementById('back').onclick=closeDetail;
  history.pushState({detail:true},'');
}
function closeDetail(){
  detailEl.classList.remove('open');
  detailEl.setAttribute('aria-hidden','true');
  document.body.style.overflow='';
}
window.addEventListener('popstate',()=>{ if(detailEl.classList.contains('open')) closeDetail(); });

render();
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
</body>
</html>
