<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1B4297">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DMA Lojas">
<meta name="robots" content="noindex, nofollow">

<title>DMA · Lojas</title>
<style>
  :root{
    --blue:#1B4297; --blue-deep:#15306E; --blue-bright:#244FB0;
    --lav:#A6A8CE; --lav-soft:#E6E8F4;
    --ink:#16192A; --muted:#666C82; --faint:#9AA0B4;
    --bg:#F1F3F8; --card:#FFFFFF; --line:#E4E7F0; --line-soft:#EFF1F7;
    --green:#1A9C5B; --green-bg:#E6F5EE;
    --crit:#D23B36; --alerta:#E08A1E; --bom:#2B6FB0; --otimo:#1A9C5B;
    --shadow:0 1px 2px rgba(22,25,42,.06), 0 6px 18px rgba(22,25,42,.06);
    --safe-top:env(safe-area-inset-top,0px);
    --safe-bottom:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    background:var(--bg); color:var(--ink); font-variant-numeric:tabular-nums;
    -webkit-font-smoothing:antialiased; overscroll-behavior-y:none;
  }
  .app{max-width:520px;margin:0 auto;min-height:100%;background:var(--bg);position:relative;}

  header.top{
    position:sticky;top:0;z-index:30;
    background:linear-gradient(160deg,var(--blue-bright) 0%, var(--blue) 55%, var(--blue-deep) 130%);
    color:#fff; padding:calc(var(--safe-top) + 14px) 16px 12px;
    box-shadow:0 4px 16px rgba(21,48,110,.30);
  }
  .brand{display:flex;align-items:center;gap:11px;margin-bottom:13px;}
  .logo{
    width:42px;height:38px;border-radius:9px;flex:none;display:grid;place-items:center;
    background:#fff;color:var(--blue);font-weight:800;font-size:15px;letter-spacing:-.5px;
    box-shadow:inset 0 0 0 2px rgba(27,66,151,.10);
  }
  .brand .t{line-height:1;}
  .brand .t b{font-size:17px;font-weight:700;letter-spacing:.2px;display:block;}
  .brand .t span{font-size:11px;opacity:.85;letter-spacing:.7px;text-transform:uppercase;font-weight:600;}
  .brand .count{margin-left:auto;text-align:right;line-height:1;}
  .brand .count b{font-size:19px;font-weight:800;display:block;}
  .brand .count span{font-size:10px;opacity:.85;letter-spacing:.6px;text-transform:uppercase;}

  .searchwrap{position:relative;}
  .searchwrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.55;}
  #q{
    width:100%;border:0;border-radius:12px;padding:12px 38px 12px 38px;font-size:16px;
    background:rgba(255,255,255,.97);color:var(--ink);font-family:inherit;outline:none;
  }
  #q::placeholder{color:var(--faint);}
  .clearbtn{position:absolute;right:6px;top:50%;transform:translateY(-50%);border:0;background:transparent;
    width:32px;height:32px;border-radius:8px;color:var(--muted);font-size:18px;display:none;place-items:center;cursor:pointer;}
  .clearbtn.show{display:grid;}

  .meta{padding:12px 16px 4px;font-size:12px;color:var(--muted);font-weight:600;letter-spacing:.3px;}
  .list{padding:4px 12px calc(28px + var(--safe-bottom));}

  .row{
    background:var(--card);border:1px solid var(--line);border-radius:14px;margin-bottom:9px;
    box-shadow:var(--shadow);display:flex;align-items:stretch;overflow:hidden;
  }
  .rowmain{flex:1;min-width:0;padding:13px 12px 12px 14px;cursor:pointer;}
  .rowmain:active{background:var(--line-soft);}
  .row .head{display:flex;align-items:center;gap:9px;}
  .row .code{font-size:13px;font-weight:800;color:var(--blue);letter-spacing:.3px;flex:none;}
  .row .name{font-size:15.5px;font-weight:700;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .row .blogo{margin-left:auto;flex:none;height:20px;display:flex;align-items:center;}
  .row .blogo img{height:20px;width:auto;display:block;border-radius:3px;}
  .row .blogo .txt{font-size:10px;font-weight:800;letter-spacing:.5px;color:#fff;background:var(--blue);padding:3px 7px;border-radius:5px;}
  .row .loc{font-size:12.5px;color:var(--muted);margin:5px 0 9px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .row .elec{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink);font-weight:600;flex-wrap:wrap;}
  .row .elec .b{display:inline-flex;align-items:center;gap:4px;background:var(--line-soft);padding:3px 7px;border-radius:6px;}
  .row .elec .b.dim{color:var(--faint);}
  .bolt{color:var(--blue);flex:none;}

  .callcol{
    flex:none;width:62px;border-left:1px solid var(--line);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
    background:#fff;cursor:pointer;text-decoration:none;color:var(--green);
  }
  .callcol:active{background:var(--green-bg);}
  .callcol .circ{width:38px;height:38px;border-radius:50%;background:var(--green-bg);display:grid;place-items:center;}
  .callcol .lbl{font-size:9px;font-weight:800;letter-spacing:.4px;color:var(--green);text-transform:uppercase;}

  .empty{text-align:center;padding:54px 30px;color:var(--muted);}
  .empty b{display:block;font-size:16px;color:var(--ink);margin-bottom:6px;}

  /* detail */
  .detail{position:fixed;inset:0;z-index:50;background:var(--bg);transform:translateX(100%);
    transition:transform .26s cubic-bezier(.3,.7,.3,1);overflow-y:auto;max-width:520px;margin:0 auto;}
  .detail.open{transform:translateX(0);}
  .dhead{position:sticky;top:0;z-index:2;color:#fff;padding:calc(var(--safe-top) + 10px) 16px 16px;
    background:linear-gradient(160deg,var(--blue-bright) 0%, var(--blue) 55%, var(--blue-deep) 135%);
    box-shadow:0 4px 16px rgba(21,48,110,.28);}
  .backbtn{border:0;background:rgba(255,255,255,.16);color:#fff;width:38px;height:38px;border-radius:10px;
    display:grid;place-items:center;cursor:pointer;margin-bottom:12px;}
  .dtop{display:flex;align-items:flex-start;gap:12px;}
  .dtop .di{flex:1;min-width:0;}
  .dhead .dcode{font-size:13px;font-weight:800;letter-spacing:1px;opacity:.9;}
  .dhead .dname{font-size:24px;font-weight:800;letter-spacing:-.3px;margin:3px 0 9px;line-height:1.1;}
  .dhead .status{font-size:11px;font-weight:700;letter-spacing:.4px;background:rgba(255,255,255,.18);
    padding:4px 9px;border-radius:6px;text-transform:uppercase;}
  .dhead .status.open::before{content:"";display:inline-block;width:7px;height:7px;border-radius:50%;
    background:#5BE08A;margin-right:6px;vertical-align:middle;}
  .dlogo{flex:none;background:#fff;border-radius:9px;padding:7px 9px;display:flex;align-items:center;min-height:40px;}
  .dlogo img{height:30px;width:auto;display:block;}
  .dlogo .txt{font-size:12px;font-weight:800;color:var(--blue);letter-spacing:.5px;}

  .actions{display:flex;gap:9px;padding:14px 16px 2px;}
  .actbtn{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;text-decoration:none;
    padding:13px;border-radius:13px;font-size:14.5px;font-weight:700;box-shadow:var(--shadow);}
  .actbtn.call{background:var(--green);color:#fff;}
  .actbtn.call:active{background:#157a47;}
  .actbtn.map{background:#fff;color:var(--blue);border:1px solid var(--line);}
  .actbtn.map:active{background:var(--line-soft);}

  .section{padding:16px 16px 2px;}
  .section .lbl{font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--faint);margin-bottom:9px;}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden;}

  .maplink{display:flex;align-items:center;gap:13px;padding:14px 15px;text-decoration:none;color:inherit;}
  .maplink:active{background:var(--line-soft);}
  .mapicon{width:42px;height:42px;border-radius:11px;flex:none;display:grid;place-items:center;background:var(--blue);color:#fff;}
  .maplink .addr{flex:1;min-width:0;}
  .maplink .addr .street{font-size:15px;font-weight:700;line-height:1.3;}
  .maplink .addr .city{font-size:13px;color:var(--muted);margin-top:2px;}
  .maplink .go{font-size:12px;font-weight:800;color:var(--blue);letter-spacing:.3px;flex:none;display:flex;align-items:center;gap:3px;}

  .kv{display:flex;justify-content:space-between;align-items:center;gap:14px;padding:12px 15px;border-top:1px solid var(--line-soft);}
  .kv:first-child{border-top:0;}
  .kv .k{font-size:13px;color:var(--muted);font-weight:600;flex:none;}
  .kv .v{font-size:14.5px;font-weight:700;text-align:right;color:var(--ink);overflow-wrap:anywhere;}
  .kv .v.mono{letter-spacing:.2px;}
  .kv .v.dash{color:var(--faint);font-weight:600;}
  .schip{font-size:12px;font-weight:800;padding:3px 10px;border-radius:999px;color:#fff;}
  .s-crit{background:var(--crit);} .s-alerta{background:var(--alerta);} .s-bom{background:var(--bom);} .s-otimo{background:var(--otimo);}
  .gtag{font-size:12px;font-weight:700;padding:3px 9px;border-radius:6px;}
  .g-in{background:var(--green-bg);color:var(--green);} .g-out{background:#FBE9E8;color:var(--crit);}

  .footnote{padding:18px 16px calc(30px + var(--safe-bottom));text-align:center;color:var(--faint);font-size:11px;line-height:1.5;}
  @media (prefers-reduced-motion: reduce){ .detail,.row{transition:none !important;} }
</style>
</head>

const CEMIG = '08007232827';

const NULLISH = new Set(['','NA','N/A','0','0V','-','—','NÃO INFORMADO','#N/D','NÃO SE APLICA']);
const isNull = v => v===0?false:(!v || NULLISH.has(String(v).trim().toUpperCase()));
const show = v => isNull(v) ? '—' : String(v).trim();
const norm = s => (s||'').toString().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');

function bandeiraKey(b){
  b=(b||'').toUpperCase().trim();
  if(b==='EPA') return 'epa';
  if(b==='MINEIRÃO') return 'mineirao';
  if(b.startsWith('BH')) return 'bh';
  return 'txt';
}
function bandeiraLogoHTML(b, cls){
  const k=bandeiraKey(b);
  if(k==='txt'){ const t=(b||'').toUpperCase()==='CD'?'DMA':show(b); return `<span class="txt">${t}</span>`; }
  return `<img src="${LOGOS[k]}" alt="${show(b)}">`;
}
function kva(v){ if(isNull(v)) return '—'; v=String(v).trim(); return /kva/i.test(v)?v:v+' kVA'; }
function tensao(v){ if(isNull(v)) return '—'; v=String(v).trim(); return /v$/i.test(v)?v:v+' V'; }
function lux(v){ if(isNull(v)) return '—'; return String(v).replace('.',',')+' lx'; }
function mapsUrl(d){
  const parts=[d.rua,d.bairro,d.cidade].filter(p=>!isNull(p));
  if(!parts.length) return null;
  return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(parts.join(', '));
}
function lumClass(s){ s=(s||'').toLowerCase(); if(s.includes('crít'))return's-crit';if(s.includes('alerta'))return's-alerta';if(s.includes('bom'))return's-bom';if(s.includes('ótimo')||s.includes('otimo'))return's-otimo';return''; }

let fQuery='';
const qEl=document.getElementById('q'), clearEl=document.getElementById('clear');
qEl.oninput=()=>{ fQuery=qEl.value; clearEl.classList.toggle('show',!!fQuery); render(); };
clearEl.onclick=()=>{ qEl.value='';fQuery='';clearEl.classList.remove('show');qEl.focus();render(); };

const listEl=document.getElementById('list'), metaEl=document.getElementById('meta');
document.getElementById('total').textContent=DATA.length;

function match(d){
  if(!fQuery) return true;
  const q=norm(fQuery);
  const hay=norm([d.loja,d.nome1,d.nome_red,d.cidade,d.bairro,d.local,d.regiao,d.regional,d.uc,d.motor,d.bandeira].join(' '));
  return hay.includes(q);
}

function render(){
  const res=DATA.filter(match);
  metaEl.textContent = res.length===DATA.length ? `${res.length} lojas` : `${res.length} de ${DATA.length} lojas`;
  if(!res.length){ listEl.innerHTML='<div class="empty"><b>Nada encontrado</b><span>Ajuste a busca.</span></div>'; return; }
  const frag=document.createDocumentFragment();
  res.forEach(d=>{
    const idx=DATA.indexOf(d);
    const nome=show(d.nome_red)!=='—'?show(d.nome_red):show(d.nome1);
    const loc=[d.bairro||d.local,d.cidade].filter(x=>!isNull(x)).join(' · ');
    const elec = isNull(d.motor)
      ? `<span class="b dim">Sem gerador</span>`
      : `<span class="b"><svg class="bolt" width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M13 2L3 14h7l-1 8 10-12h-7z"/></svg>${show(d.motor)}</span>`+
        (isNull(d.kva)?'':`<span class="b">${kva(d.kva)}</span>`)+
        (isNull(d.tensao)?'':`<span class="b">${tensao(d.tensao)}</span>`)+
        (isNull(d.tipo)?'':`<span class="b">${show(d.tipo).toUpperCase()}</span>`);
    const card=document.createElement('div');
    card.className='row';
    card.innerHTML=
      `<div class="rowmain">
         <div class="head">
           <span class="code">${show(d.loja)}</span>
           <span class="name">${nome}</span>
           <span class="blogo">${bandeiraLogoHTML(d.bandeira)}</span>
         </div>
         <div class="loc">${loc||'—'}</div>
         <div class="elec">${elec}</div>
       </div>
       <a class="callcol" href="tel:${CEMIG}" aria-label="Ligar para a Cemig">
         <span class="circ">
           <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
         </span>
         <span class="lbl">Cemig</span>
       </a>`;
    card.querySelector('.rowmain').onclick=()=>openDetail(idx);
    frag.appendChild(card);
  });
  listEl.innerHTML='';listEl.appendChild(frag);
}

const detailEl=document.getElementById('detail');
function kvRow(k,v,vClass){ const dash=(v==='—'||v==null); return `<div class="kv"><span class="k">${k}</span><span class="v ${vClass||''} ${dash?'dash':''}">${v==null?'—':v}</span></div>`; }

function openDetail(idx){
  const d=DATA[idx];
  const nome=show(d.nome_red)!=='—'?show(d.nome_red):show(d.nome1);
  const url=mapsUrl(d);
  const city=[d.bairro||d.local,d.cidade].filter(x=>!isNull(x)).join(' · ')||'—';
  const lumCls=lumClass(d.luminancia);
  const garIn=/em garantia/i.test(d.garantia||'');
  const fornec=[['Civil',d.civil],['Padaria',d.padaria],['Açougue / Frios',d.acougue],['Serralheria',d.serralheria],['Hidráulica',d.hidraulica],['Elétrica',d.eletrica],['Refrigeração',d.refrigeracao]];
  const temFornec=fornec.some(([k,v])=>!isNull(v));

  const addrInner=
    `<div class="mapicon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg></div>
     <div class="addr"><div class="street">${show(d.rua)}</div><div class="city">${city}</div></div>
     ${url?'<div class="go">MAPS <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M7 17L17 7M9 7h8v8"/></svg></div>':''}`;
  const addrBlock = url ? `<a class="maplink" href="${url}" target="_blank" rel="noopener">${addrInner}</a>` : `<div class="maplink" style="cursor:default">${addrInner}</div>`;

  detailEl.innerHTML=
    `<div class="dhead">
       <button class="backbtn" id="back" aria-label="Voltar"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
       <div class="dtop">
         <div class="di">
           <div class="dcode">${show(d.loja)}</div>
           <div class="dname">${nome}</div>
           ${isNull(d.status)?'':`<span class="status ${/abert/i.test(d.status)?'open':''}">${show(d.status)}</span>`}
         </div>
         <div class="dlogo">${bandeiraLogoHTML(d.bandeira)}</div>
       </div>
     </div>

     <div class="actions">
       <a class="actbtn call" href="tel:${CEMIG}">
         <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
         Ligar Cemig
       </a>
       ${url?`<a class="actbtn map" href="${url}" target="_blank" rel="noopener"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>Maps</a>`:''}
     </div>

     <div class="section">
       <div class="lbl">Endereço</div>
       <div class="panel">${addrBlock}</div>
     </div>

     <div class="section">
       <div class="lbl">Gerador</div>
       <div class="panel">
         ${kvRow('Motor', show(d.motor))}
         ${kvRow('Potência', kva(d.kva),'mono')}
         ${kvRow('Tensão', tensao(d.tensao),'mono')}
         ${kvRow('Cobertura', isNull(d.tipo)?'—':show(d.tipo).toUpperCase())}
         ${kvRow('Rampa', isNull(d.rampa)?'—':(/^s/i.test(d.rampa)?'Sim':'Não'))}
         ${kvRow('Técnico', show(d.tecnico))}
       </div>
     </div>

     <div class="section">
       <div class="lbl">Iluminação</div>
       <div class="panel">
         ${kvRow('Média', lux(d.lux),'mono')}
         ${kvRow('Status luminância', isNull(d.luminancia)?'—':`<span class="schip ${lumCls}">${show(d.luminancia)}</span>`)}
         ${kvRow('Marca / tipo', show(d.marca_ilum))}
         ${kvRow('Garantia', isNull(d.garantia)?'—':`<span class="gtag ${garIn?'g-in':'g-out'}">${show(d.garantia)}</span>`)}
       </div>
     </div>

     ${temFornec?`<div class="section">
       <div class="lbl">Fornecedores de manutenção</div>
       <div class="panel">
         ${fornec.map(([k,v])=>kvRow(k, show(v))).join('')}
       </div>
     </div>`:''}

     <div class="section">
       <div class="lbl">Cadastro</div>
       <div class="panel">
         ${kvRow('Bandeira', show(d.bandeira))}
         ${kvRow('Região', show(d.regiao))}
         ${kvRow('Regional', show(d.regional))}
         ${kvRow('Estado', show(d.estado))}
         ${kvRow('Unidade Consumidora', show(d.uc),'mono')}
         ${kvRow('UC (original)', show(d.uc_orig),'mono')}
         ${kvRow('CNPJ', show(d.cnpj),'mono')}
       </div>
     </div>

     <div class="footnote">DMA · Lojas — ficha cadastral interna</div>`;

  detailEl.classList.add('open'); detailEl.setAttribute('aria-hidden','false'); detailEl.scrollTop=0;
  document.body.style.overflow='hidden';
  document.getElementById('back').onclick=closeDetail;
  history.pushState({detail:true},'');
}
function closeDetail(){ detailEl.classList.remove('open'); detailEl.setAttribute('aria-hidden','true'); document.body.style.overflow=''; }
window.addEventListener('popstate',()=>{ if(detailEl.classList.contains('open')) closeDetail(); });

render();
if('serviceWorker' in navigator){ window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{})); }
</script>
</body>
</html>
